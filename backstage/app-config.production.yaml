app:
  # Should be the same as backend.baseUrl when using the `app-backend` plugin.
  baseUrl: ${BASE_URL}:443

backend:
  # Note that the baseUrl should be the URL that the browser and other clients
  # should use when communicating with the backend, i.e. it needs to be
  # reachable not just from within the backend host, but from all of your
  # callers. When its value is "http://localhost:7007", it's strictly private
  # and can't be reached by others.
  baseUrl: ${BASE_URL}:443
  # The listener can also be expressed as a single <host>:<port> string. In this case we bind to
  # all interfaces, the most permissive setting. The right value depends on your specific deployment.
  listen: 
    host: 0.0.0.0
    port: 7007
  csp:
    upgrade-insecure-requests: false
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: ${BASE_URL}:443
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
    Access-Control-Allow-Origin: '*'
    headers: ['Content-Type', 'X-Requested-With', 'Authorization']
  https:
    certificate:
      type: 'pem'
      key:
          $file: /etc/tls/tls.key  #When running a YARN build you will need to make this resolve to the correct path in this case add a . however that will need to change when you build the image for the actual mount point. Alternativley create a local app-config with this removed to run YARN builds.
      cert: 
          $file: /etc/tls/tls.crt
  logging:
    level: info
    overrides:
      - match: catalog
        level: debug
      - match: catalog-provider
        level: debug


  # config options: https://node-postgres.com/apis/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
      ssl:
        require: true
        rejectUnauthorized: false
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  providers:
    # See https://backstage.io/docs/auth/guest/provider
    # guest: {}
    microsoft:
      development:
        clientId: ${AZURE_CLIENT_ID}
        clientSecret: ${AZURE_CLIENT_SECRET}
        tenantId: ${AZURE_TENANT_ID}
        domainHint: ${AZURE_TENANT_ID}
        signIn:
          resolvers:
            - resolver: emailMatchingUserEntityAnnotation
              dangerouslyAllowSignInWithoutUserInCatalog: true
  # see https://backstage.io/docs/ai/mcp-actions#client-id-metadata-documents
  # to learn more about client id metadata documents
  experimentalClientIdMetadataDocuments:
    enabled: false
    # Optional: restrict which `client_id` URLs are allowed (defaults to ['*'])
    # allowedClientIdPatterns:
    #   - 'https://example.com/*'
    #   - 'https://*.trusted-domain.com/*'
    # Optional: restrict which redirect URIs are allowed (defaults to ['*'])
    # allowedRedirectUriPatterns:
    #   - 'http://localhost:*'
    #   - 'https://*.example.com/*'

catalog:
  # Overrides the default list locations from app-config.yaml as these contain example data.
  # See https://backstage.io/docs/features/software-catalog/#adding-components-to-the-catalog for more details
  # on how to get entities into the catalog.
  locations:
    # Local example data, replace this with your production config, these are intended for demo use only.
    # File locations are relative to the backend process, typically in a deployed context, such as in a Docker container, this will be the root
    - type: file
      target: ./examples/entities.yaml

    # Local example template
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

      # Deploy App to K8s Example
    - type: file
      target: ./template-cluster/template.yaml
      rules:
        - allow: [Template]

    # Local example organizational data
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]
