apiVersion: kubernetes.example.com/v1alpha1
kind: AksClusterClaim
metadata:
  name: my-app-cluster
  annotations:
    crossplane.io/external-name: my-app-cluster
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  location: "North Europe"
  aks:
    defaultNodePool:
      name: system
      vmSize: Standard_D2s_v3
      enableAutoScaling: true
      nodeCount: 1
      minCount: 1
      maxCount: 20
      maxPods: 30
      nodeLabels:
        mode: system
      onlyCriticalAddonsEnabled: false
      osDiskSizeGb: 128
      osDiskType: Managed
    roleBasedAccessControlEnabled: true
    oidcIssuerEnabled: true
    workloadIdentityEnabled: true
    privateClusterEnabled: false
    azureActiveDirectoryRoleBasedAccessControl:
      - adminGroupObjectIds:
          - 6191885f-33f4-4a62-8e58-b7e4aec173af
        azureRbacEnabled: true
        managed: true
    azurePolicyEnabled: true
    networkProfile:
      - networkPlugin: azure
        networkPolicy: azure
        outboundType: loadBalancer
        dnsServiceIp: 172.16.0.10
        serviceCidr: 172.16.0.0/16
    workloadAutoscalerProfile:
      - kedaEnabled: true
        verticalPodAutoscalerEnabled: true
    tags:
      environment: Test
      provisionedBy: Crossplane
  userNodePool:
    name: user
    vmSize: Standard_B2s
    enableAutoScaling: true
    nodeCount: 1
    minCount: 1
    maxCount: 20
    maxPods: 30
    nodeLabels:
      mode: user
    osDiskSizeGb: 128
    osDiskType: Managed
    osSku: AzureLinux
    osType: Linux
  subnet:
    name: MainSubnet
    privateEndpointNetworkPoliciesEnabled: true
    privateLinkServiceNetworkPoliciesEnabled: false
    addressPrefixes:
      - 10.0.0.0/16
  virtualNetwork:
    addressSpace:
      - 10.0.0.0/8
    tags:
      environment: Test
      provisionedBy: Crossplane
  resourceGroup:
    tags:
      createdWith: "Terraform"
      pattern: "GitOpsBridge"
      omgeving: "ontw"
      eigenaar: "Lars Maes"
      contact: "lars.maes@cz.nl"
      divisie: "it en data"
      afdeling: "tech enablement"
      team: "Azure Cloud Enablement"
      keten: "Platform Engineering"
      applicatie: "AKS Platform Engineering"
